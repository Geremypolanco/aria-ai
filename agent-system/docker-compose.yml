version: "3.9"

services:
  # ── Base de Datos ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable POSTGRES_PASSWORD requerida}
      POSTGRES_DB: ${POSTGRES_DB:-aria_agents}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./core/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aria} -d ${POSTGRES_DB:-aria_agents}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aria-network

  # ── Redis (Message Bus) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aria-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aria-network

  # ── Hashicorp Vault ────────────────────────────────────
  vault:
    image: hashicorp/vault:1.18
    container_name: aria-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/file
      - vault_logs:/vault/logs
      - ./core/vault/policies.hcl:/vault/config/policies.hcl:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aria-network
    command: server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}

  # ── Sandbox (Contenedor Efímero) ───────────────────────
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: agent-sandbox:latest
    container_name: aria-sandbox
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-512m}
      SANDBOX_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-1.0}
      SANDBOX_TIMEOUT_SECONDS: ${SANDBOX_TIMEOUT_SECONDS:-120}
    networks:
      - aria-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Browser (Playwright aislado) ────────────────────────
  browser:
    build:
      context: ./browser
      dockerfile: Dockerfile
    image: agent-browser:latest
    container_name: aria-browser
    restart: unless-stopped
    environment:
      BROWSER_TIMEOUT_SECONDS: ${BROWSER_TIMEOUT_SECONDS:-60}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
    volumes:
      - browser_profiles:/app/profiles
    networks:
      - aria-network
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── API / WebSocket ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: aria-agent-api:latest
    container_name: aria-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      API_SECRET_KEY: ${API_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - aria-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  vault_data:
    driver: local
  vault_logs:
    driver: local
  browser_profiles:
    driver: local

networks:
  aria-network:
    driver: bridge
