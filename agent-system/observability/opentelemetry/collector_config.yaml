# ARIA Agent System — OpenTelemetry Collector Configuration
# Recibe trazas, métricas y logs de los agentes y los exporta a Grafana Tempo/Loki/Prometheus
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: 'aria-agents'
          scrape_interval: 10s
          static_configs:
            - targets: ['api:9090']

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  attributes:
    actions:
      - key: service.name
        value: aria-agent-system
        action: upsert
  resource:
    attributes:
      - key: environment
        value: production
        action: upsert

exporters:
  # Trazas → Tempo / Jaeger
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true
  
  # Métricas → Prometheus
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: aria
  
  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
  
  # Debug (consola)
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, resource]
      exporters: [otlp, debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, debug]