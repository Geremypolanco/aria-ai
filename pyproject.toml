[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "PIE", "RET", "SIM", "TCH"]
ignore = [
    "E501",   # line too long — black handles this
    "B008",   # do not perform function calls in argument defaults (FastAPI depends)
    "N818",   # Exception name should end in 'Error' — we use ARIA conventions
    "RET504", # Unnecessary assignment before return
    "SIM108", # Use ternary operator — readability
]

[tool.ruff.per-file-ignores]
"tests/**" = ["S101", "PLR2004"]  # allow assert, magic values in tests

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
warn_return_any = false
warn_unused_ignores = true
disallow_untyped_defs = false
check_untyped_defs = true
exclude = ["tests/", "migrations/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--tb=short",
    "--strict-markers",
    "-q",
]
markers = [
    "integration: marks tests as integration tests (require external services)",
    "slow: marks tests as slow (deselect with -m 'not slow')",
]

[tool.coverage.run]
source = ["apps"]
omit = ["tests/*", "*/migrations/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "@abstractmethod",
]
