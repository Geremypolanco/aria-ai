[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "PIE", "RET", "SIM", "TCH"]
ignore = [
    "E501",   # line too long — black handles this
    "B008",   # do not perform function calls in argument defaults (FastAPI depends)
    "N818",   # Exception name should end in 'Error' — we use ARIA conventions
    "RET504", # Unnecessary assignment before return
    "SIM108", # Use ternary operator — readability
    "E741",   # ambiguous variable name (l, O, I) — legacy code throughout
    "B904",   # raise from — exception chaining, not always applicable
    "E701",   # multiple statements on one line — legacy inline ifs
    "SIM117", # nested with statements — readability preference
    "SIM102", # nested if statements — readability preference
    "N806",   # uppercase local variable — intentional constants in functions
    "E402",   # module level import not at top — lazy imports for perf
    "B005",   # .strip() with multi-char — intentional in prompt trimming
    "B007",   # loop variable unused — intentional in retry loops
    "UP031",  # % formatting — legacy string formatting
    "UP038",  # isinstance with X | Y — Python 3.10+ only, not universally applied
    "TCH003", # move stdlib import to TYPE_CHECKING block — optimization, not required
]

[tool.ruff.per-file-ignores]
"tests/**" = ["S101", "PLR2004"]  # allow assert, magic values in tests
"apps/core/tools/income_loop.py" = [
    "N806",   # local constants in UPPER_CASE inside functions (intentional)
    "N814",   # CamelCase import aliased as constant (intentional short alias)
    "SIM117", # nested with statements — readability
    "SIM102", # nested if — readability
    "RET505", # elif after return — readability
    "E741",   # ambiguous variable name 'l' — legacy code
    "E701",   # multiple statements on one line — legacy code
]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
warn_return_any = false
warn_unused_ignores = true
disallow_untyped_defs = false
check_untyped_defs = true
exclude = ["tests/", "migrations/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--tb=short",
    "--strict-markers",
    "-q",
]
markers = [
    "integration: marks tests as integration tests (require external services)",
    "slow: marks tests as slow (deselect with -m 'not slow')",
]

[tool.coverage.run]
source = ["apps"]
omit = ["tests/*", "*/migrations/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "@abstractmethod",
]
