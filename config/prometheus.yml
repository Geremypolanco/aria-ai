global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'aria-ai'
    static_configs:
      - targets: ['host.docker.internal:9090'] # Asumiendo que ARIA expone métricas en el host
    metrics_path: '/metrics'
