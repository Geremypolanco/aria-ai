name: Deploy Aria Core to Fly.io

  on:
    push:
      branches:
        - main
      paths:
        - 'apps/core/**'
        - 'fly.toml'
        - '.github/workflows/deploy-core.yml'
    workflow_dispatch:
      inputs:
        reason:
          description: 'Razon del deploy manual'
          required: false
          default: 'Deploy manual desde GitHub'

  jobs:
    deploy:
      name: Deploy to Fly.io
      runs-on: ubuntu-latest
      timeout-minutes: 20

      steps:
        - name: Checkout codigo
          uses: actions/checkout@v4

        - name: Setup Fly CLI
          uses: superfly/flyctl-actions/setup-flyctl@master

        - name: Configurar secrets en Fly.io
          run: |
            flyctl secrets set \
              GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              HF_API_KEY="${{ secrets.HF_API_KEY }}" \
              HUGGING_FACE_TOKEN="${{ secrets.HUGGING_FACE_TOKEN }}" \
              GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
              ELEVENLABS_API_KEY="${{ secrets.ELEVENLABS_API_KEY }}" \
              DID_API_KEY="${{ secrets.DID_API_KEY }}" \
              TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
              SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
              UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
              STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
              PAYPAL_CLIENT_SECRET="${{ secrets.PAYPAL_CLIENT_SECRET }}" \
              GUMROAD_TOKEN="${{ secrets.GUMROAD_TOKEN }}" \
              TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
              TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
              CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
              CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
              CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
              CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
              VERCEL_TOKEN="${{ secrets.VERCEL_TOKEN }}" \
              NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
              SERP_API_KEY="${{ secrets.SERP_API_KEY }}" \
              PEXELS_API_KEY="${{ secrets.PEXELS_API_KEY }}" \
              MAILCHIMP_API_KEY="${{ secrets.MAILCHIMP_API_KEY }}" \
              BUFFER_TOKEN="${{ secrets.BUFFER_TOKEN }}" \
              AIRTABLE_API_KEY="${{ secrets.AIRTABLE_API_KEY }}" \
              SHOPIFY_URL="${{ secrets.SHOPIFY_URL }}" \
              SHOPIFY_API_KEY="${{ secrets.SHOPIFY_API_KEY }}" \
              SHOPIFY_ACCESS_TOKEN="${{ secrets.SHOPIFY_ACCESS_TOKEN }}" \
              SHOPIFY_AUTOMATION_TOKEN="${{ secrets.SHOPIFY_AUTOMATION_TOKEN }}" \
              CANVA_CLIENT_ID="${{ secrets.CANVA_CLIENT_ID }}" \
              CANVA_CLIENT_SECRET="${{ secrets.CANVA_CLIENT_SECRET }}" \
              ARIA_BASE_URL="https://aria-ai.fly.dev" \
              OWNER_EMAIL="geremypolancod@gmail.com" \
              OWNER_NAME="Geremy Polanco" \
              ENVIRONMENT="production" \
              CYCLE_INTERVAL_MINUTES="60" \
              REQUIRE_APPROVAL_FOR_PAYMENTS="true" \
              REQUIRE_APPROVAL_FOR_DEPLOYS="false" \
              MAX_SPEND_WITHOUT_APPROVAL_USD="0.0" \
              --app aria-ai
          env:
            FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

        - name: Deploy a Fly.io
          run: flyctl deploy --remote-only --app aria-ai
          env:
            FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

        - name: Verificar deploy y notificar
          run: |
            STATUS=$(flyctl status --app aria-ai --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Status','unknown'))" 2>/dev/null || echo "deployed")
            echo "Deploy completado. Status: $STATUS"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "parse_mode=HTML" \
              -d "text=<b>ARIA desplegada</b>%0A%0AVersion actualizada exitosamente en Fly.io.%0ABot activo en @Aria_knowled_bot" || true
          env:
            FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  