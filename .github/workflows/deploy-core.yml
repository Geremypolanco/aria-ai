name: Deploy Aria Core to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - 'apps/core/**'
      - 'fly.toml'
      - '.github/workflows/deploy-core.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razón del deploy manual'
        required: false
        default: 'Deploy manual desde GitHub'

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Configurar secrets en Fly.io
        run: |
          flyctl secrets set \
            HF_TOKEN="${{ secrets.HF_TOKEN }}" \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
            UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN_ARIA }}" \
            GITHUB_USERNAME="Geremypolanco" \
            VERCEL_TOKEN="${{ secrets.VERCEL_TOKEN }}" \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            PAYPAL_SECRET="${{ secrets.PAYPAL_SECRET }}" \
            GUMROAD_TOKEN="${{ secrets.GUMROAD_TOKEN }}" \
            SHOPIFY_URL="${{ secrets.SHOPIFY_URL }}" \
            SHOPIFY_AUTOMATION_TOKEN="${{ secrets.SHOPIFY_AUTOMATION_TOKEN }}" \
            SHOPIFY_API_KEY="${{ secrets.SHOPIFY_API_KEY }}" \
            ELEVENLABS_API_KEY="${{ secrets.ELEVENLABS_API_KEY }}" \
            PEXELS_API_KEY="${{ secrets.PEXELS_API_KEY }}" \
            CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            CANVA_CLIENT_ID="${{ secrets.CANVA_CLIENT_ID }}" \
            CANVA_CLIENT_SECRET="${{ secrets.CANVA_CLIENT_SECRET }}" \
            MAILCHIMP_API_KEY="${{ secrets.MAILCHIMP_API_KEY }}" \
            MAILCHIMP_DC="${{ secrets.MAILCHIMP_DC }}" \
            BUFFER_TOKEN="${{ secrets.BUFFER_TOKEN }}" \
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            AIRTABLE_TOKEN="${{ secrets.AIRTABLE_TOKEN }}" \
            NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            SERP_API_KEY="${{ secrets.SERP_API_KEY }}" \
            TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}" \
            TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            OWNER_NAME="Señor Polanco" \
            ENVIRONMENT="production" \
            CYCLE_INTERVAL_MINUTES="60" \
            REQUIRE_APPROVAL_FOR_PAYMENTS="true" \
            REQUIRE_APPROVAL_FOR_DEPLOYS="false" \
            MAX_SPEND_WITHOUT_APPROVAL_USD="0.0" \
            --app aria-ai
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy a Fly.io
        run: flyctl deploy --remote-only --app aria-ai
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verificar deploy
        run: |
          echo "✅ Deploy completado — versión $(flyctl status --app aria-ai --json | jq .Version)"
          flyctl status --app aria-ai
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
