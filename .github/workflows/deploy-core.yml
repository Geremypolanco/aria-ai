name: Deploy Aria Core to Fly.io
on:
  push:
    branches:
      - main
    paths:
      - 'apps/core/**'
      - 'fly.toml'
      - '.github/workflows/deploy-core.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razon del deploy manual'
        required: false
        default: 'Deploy manual'
jobs:
  preflight:
    name: Pre-flight Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check all Python files
        run: |
          echo "Checking Python syntax..."
          find apps/core -name "*.py" | while read f; do
            python3 -m py_compile "$f" || { echo "SYNTAX ERROR: $f"; exit 1; }
          done
          echo "OK - all Python files pass syntax check"
      - name: Check critical imports
        run: |
          pip install fastapi pydantic pydantic-settings httpx groq openai apscheduler supabase --quiet 2>&1 | tail -2
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from apps.core.config import Settings; print('OK config.py')
          from apps.core.tools.ai_client import AIModel, AIProvider
          print('OK ai_client.py - models:', [m.value for m in AIModel])
          print('Pre-flight passed')
          "
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set secrets on Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            TELEGRAM_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            HF_API_KEY="${{ secrets.HF_API_KEY }}" \
            HUGGING_FACE_TOKEN="${{ secrets.HF_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
            UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
            GITHUB_REPO="Geremypolanco/aria-ai" \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            PAYPAL_SECRET="${{ secrets.PAYPAL_SECRET }}" \
            GUMROAD_TOKEN="${{ secrets.GUMROAD_TOKEN }}" \
            SHOPIFY_URL="${{ secrets.SHOPIFY_URL }}" \
            SHOPIFY_ADMIN_TOKEN="${{ secrets.SHOPIFY_ADMIN_TOKEN }}" \
            SHOPIFY_AUTOMATION_TOKEN="${{ secrets.SHOPIFY_AUTOMATION_TOKEN }}" \
            PEXELS_API_KEY="${{ secrets.PEXELS_API_KEY }}" \
            NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            SERP_API_KEY="${{ secrets.SERP_API_KEY }}" \
            MAILCHIMP_API_KEY="${{ secrets.MAILCHIMP_API_KEY }}" \
            MAILCHIMP_DC="${{ secrets.MAILCHIMP_DC }}" \
            BUFFER_TOKEN="${{ secrets.BUFFER_TOKEN }}" \
            AIRTABLE_TOKEN="${{ secrets.AIRTABLE_TOKEN }}" \
            CLOUDINARY_URL="${{ secrets.CLOUDINARY_URL }}" \
            CANVA_CLIENT_ID="${{ secrets.CANVA_CLIENT_ID }}" \
            CANVA_CLIENT_SECRET="${{ secrets.CANVA_CLIENT_SECRET }}" \
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            ELEVENLABS_API_KEY="${{ secrets.ELEVENLABS_API_KEY }}" \
            SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            CYCLE_INTERVAL_MINUTES="60" \
            ENVIRONMENT="production" \
            PORT="8000" \
            ZAPIER_WEBHOOK_URL="https://hooks.zapier.com/hooks/catch/23373923/4bp337x/" \
            --app aria-ai
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --strategy rolling
      - name: Health check post-deploy
        run: |
          sleep 30
          STATUS=$(curl -sf https://aria-ai.fly.dev/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','?'))" 2>/dev/null || echo "unreachable")
          echo "ARIA health: $STATUS"
      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          curl -sf "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=HTML&text=🚀 <b>ARIA Deploy OK</b>%0A📦 <code>${MSG}</code>%0A🌐 aria-ai.fly.dev" || true
      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          curl -sf "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=HTML&text=❌ <b>ARIA Deploy FAILED</b>%0A📦 <code>${MSG}</code>" || true
