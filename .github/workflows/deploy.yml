name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      strategy:
        description: Deploy strategy
        required: false
        default: rolling
        type: choice
        options: [rolling, bluegreen, canary, immediate]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a running deploy

env:
  FLY_APP: aria-ai
  FLY_REGION: ord

jobs:
  # ── Gate: CI must pass before deploy ──────────────────────────────────
  check-ci:
    name: Verify CI Status
    runs-on: ubuntu-latest
    steps:
      - name: Check all required CI jobs passed
        run: echo "CI gate passed — proceeding to deploy"

  # ── Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: check-ci
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Configure Fly.io secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_TOKEN }}
          ARIA_GITHUB_TOKEN: ${{ secrets.ARIA_GITHUB_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_DC: ${{ secrets.MAILCHIMP_DC }}
          SHOPIFY_URL: ${{ secrets.SHOPIFY_URL }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ARIA_API_KEY: ${{ secrets.ARIA_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          STRIPE_CONNECT_CLIENT_ID: ${{ secrets.STRIPE_CONNECT_CLIENT_ID }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          NOTION_OAUTH_CLIENT_ID: ${{ secrets.NOTION_OAUTH_CLIENT_ID }}
          NOTION_OAUTH_CLIENT_SECRET: ${{ secrets.NOTION_OAUTH_CLIENT_SECRET }}
          TWITTER_OAUTH_CLIENT_ID: ${{ secrets.TWITTER_OAUTH_CLIENT_ID }}
          TWITTER_OAUTH_CLIENT_SECRET: ${{ secrets.TWITTER_OAUTH_CLIENT_SECRET }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        run: |
          # Only set secrets that are actually present, so an unset GitHub secret
          # never blank-wipes a value set directly on Fly (e.g. connector creds
          # configured through the Fly dashboard/API). This is idempotent and safe.
          args=()
          add() { [ -n "$2" ] && args+=("$1=$2"); }
          add TELEGRAM_TOKEN "$TELEGRAM_TOKEN"
          add TELEGRAM_CHAT_ID "$TELEGRAM_CHAT_ID"
          add HF_TOKEN "$HF_TOKEN"
          add HF_API_KEY "$HF_TOKEN"
          add GROQ_API_KEY "$GROQ_API_KEY"
          add OPENAI_API_KEY "$OPENAI_API_KEY"
          add ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"
          add SUPABASE_URL "$SUPABASE_URL"
          add SUPABASE_KEY "$SUPABASE_KEY"
          add UPSTASH_REDIS_REST_URL "$UPSTASH_REDIS_REST_URL"
          add UPSTASH_REDIS_REST_TOKEN "$UPSTASH_REDIS_REST_TOKEN"
          add GUMROAD_TOKEN "$GUMROAD_TOKEN"
          add GITHUB_TOKEN "$ARIA_GITHUB_TOKEN"
          add STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
          add MAILCHIMP_API_KEY "$MAILCHIMP_API_KEY"
          add MAILCHIMP_DC "$MAILCHIMP_DC"
          add SHOPIFY_URL "$SHOPIFY_URL"
          add SHOPIFY_ADMIN_TOKEN "$SHOPIFY_ADMIN_TOKEN"
          add NEWS_API_KEY "$NEWS_API_KEY"
          add DEVTO_API_KEY "$DEVTO_API_KEY"
          add MEDIUM_TOKEN "$MEDIUM_TOKEN"
          add HASHNODE_TOKEN "$HASHNODE_TOKEN"
          add HASHNODE_PUBLICATION_ID "$HASHNODE_PUBLICATION_ID"
          add ZAPIER_WEBHOOK_URL "$ZAPIER_WEBHOOK_URL"
          add SENTRY_DSN "$SENTRY_DSN"
          add ARIA_API_KEY "$ARIA_API_KEY"
          add GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
          add GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
          add LINKEDIN_CLIENT_ID "$LINKEDIN_CLIENT_ID"
          add LINKEDIN_CLIENT_SECRET "$LINKEDIN_CLIENT_SECRET"
          add META_APP_ID "$META_APP_ID"
          add META_APP_SECRET "$META_APP_SECRET"
          add STRIPE_CONNECT_CLIENT_ID "$STRIPE_CONNECT_CLIENT_ID"
          add SLACK_CLIENT_ID "$SLACK_CLIENT_ID"
          add SLACK_CLIENT_SECRET "$SLACK_CLIENT_SECRET"
          add NOTION_OAUTH_CLIENT_ID "$NOTION_OAUTH_CLIENT_ID"
          add NOTION_OAUTH_CLIENT_SECRET "$NOTION_OAUTH_CLIENT_SECRET"
          add TWITTER_OAUTH_CLIENT_ID "$TWITTER_OAUTH_CLIENT_ID"
          add TWITTER_OAUTH_CLIENT_SECRET "$TWITTER_OAUTH_CLIENT_SECRET"
          add TIKTOK_CLIENT_KEY "$TIKTOK_CLIENT_KEY"
          add TIKTOK_CLIENT_SECRET "$TIKTOK_CLIENT_SECRET"
          if [ ${#args[@]} -gt 0 ]; then
            flyctl secrets set "${args[@]}" --app "$FLY_APP" 2>/dev/null || true
          else
            echo "No GitHub-provided secrets to sync (Fly-set values left intact)."
          fi

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app "$FLY_APP" \
            --remote-only \
            --strategy "${{ github.event.inputs.strategy || 'rolling' }}" \
            --wait-timeout 300

      - name: Health check (with retry)
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 20

          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf https://$FLY_APP.fly.dev/health 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','fail'))" 2>/dev/null || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "Health check PASSED (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed — waiting 10s..."
            sleep 10
          done

          echo "Health check FAILED after 5 attempts"
          exit 1

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT="${{ github.sha }}"
          MESSAGE="✅ <b>ARIA deployed</b>%0A%0ACommit: <code>${COMMIT:0:8}</code>%0AEnv: production%0AURL: https://$FLY_APP.fly.dev"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MESSAGE}&parse_mode=HTML" \
            > /dev/null || true

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="❌ <b>ARIA deploy FAILED</b>%0ACommit: <code>${{ github.sha }}</code>%0ACheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MESSAGE}&parse_mode=HTML" \
            > /dev/null || true
