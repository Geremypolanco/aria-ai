<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARIA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #f1f5f9; }
    .gradient-text { background: linear-gradient(135deg, #8b5cf6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #111118; border: 1px solid #1e1e2a; border-radius: 16px; transition: all 0.2s; }
    .card:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #6d28d9); border-radius: 12px; padding: 12px 20px; font-weight: 600; }
    .btn-primary:active { transform: scale(0.97); }
    .glass { background: rgba(17,17,24,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #1e1e2a; }
    .badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .msg-user { background: #1e1e2a; border-radius: 16px 16px 4px 16px; padding: 12px 16px; max-width: 85%; }
    .msg-aria { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.2); border-radius: 16px 16px 16px 4px; padding: 12px 16px; max-width: 85%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
    @keyframes pulse-dot { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .dot-pulse { animation: pulse-dot 1.4s infinite; }
    .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body x-data="dashboardApp()" x-init="init()" class="pb-24">
  
  <!-- TOP BAR -->
  <div class="glass fixed top-0 left-0 right-0 z-50 px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button @click="sidebar = !sidebar" class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="flex items-center gap-2.5">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="w-7 h-7">
          <defs>
            <linearGradient id="ariaGlassD" x1="26" y1="6" x2="70" y2="88" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#93a6ff"/><stop offset=".42" stop-color="#3f52dd"/><stop offset=".78" stop-color="#2530a0"/><stop offset="1" stop-color="#161d70"/></linearGradient>
            <linearGradient id="ariaSpecD" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#fff" stop-opacity=".9"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
            <filter id="ariaShD" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#141a63" flood-opacity=".5"/></filter>
          </defs>
          <g filter="url(#ariaShD)" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M23 83 C 29 52, 40 28, 49 13 C 57 26, 64 36, 70 46" stroke="url(#ariaGlassD)" stroke-width="12.5"/>
            <path d="M70 46 C 79 61, 74 79, 56 78 C 41 77, 39 58, 53 53 C 63 50, 70 50, 70 46 Z" stroke="url(#ariaGlassD)" stroke-width="12.5"/>
            <path d="M26 79 C 32 51, 42 30, 49 17" stroke="url(#ariaSpecD)" stroke-width="2.6" opacity=".7"/>
          </g>
        </svg>
        <span class="font-light text-sm tracking-[0.28em] text-zinc-50" style="padding-left:.28em">ARIA</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full" :class="online ? 'bg-green-400' : 'bg-red-400'"></span>
      <span class="text-xs text-slate-500" x-text="online ? 'Online' : 'Offline'"></span>
    </div>
  </div>

  <!-- SIDEBAR OVERLAY -->
  <template x-teleport="body">
    <div x-show="sidebar" @click="sidebar = false" class="fixed inset-0 bg-black/50 z-40"></div>
  </template>

  <!-- SIDEBAR -->
  <div class="fixed top-14 left-0 bottom-0 w-64 bg-[#0d0d14] border-r border-[#1e1e2a] z-50 transform transition-transform duration-300" :class="sidebar ? 'translate-x-0' : '-translate-x-full'">
    <div class="p-4 space-y-1">
      <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-purple-500/10 text-purple-300 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 text-slate-400 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        Landing Page
      </a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="pt-14 px-4 max-w-lg mx-auto">
    
    <!-- HEADER -->
    <div class="py-6">
      <h1 class="text-2xl font-bold">Dashboard</h1>
      <p class="text-slate-500 text-sm mt-1">Centro de control de ARIA AI</p>
    </div>

    <!-- STATUS CARDS -->
    <div class="grid grid-cols-2 gap-3 mb-6">
      <div class="card p-4">
        <div class="text-xs text-slate-500 mb-1">Estado</div>
        <div class="flex items-center gap-2">
          <div class="w-2.5 h-2.5 rounded-full" :class="online ? 'bg-green-400' : 'bg-red-400'"></div>
          <span class="text-sm font-semibold" x-text="online ? 'Online' : 'Offline'"></span>
        </div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-500 mb-1">Versión</div>
        <div class="text-sm font-semibold">3.3.0</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-500 mb-1">AI Providers</div>
        <div class="text-sm font-semibold" x-text="aiProviders"></div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-500 mb-1">Herramientas</div>
        <div class="text-sm font-semibold" x-text="toolsCount"></div>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="mb-6">
      <h2 class="text-sm font-semibold text-slate-400 mb-3">ACCIONES RÁPIDAS</h2>
      <div class="grid grid-cols-2 gap-2">
        <button @click="quickAction('chat')" class="card p-3 text-center text-sm font-medium hover:border-purple-500/30 active:scale-95 transition-all">
          <svg class="w-5 h-5 mx-auto mb-1.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          Chat
        </button>
        <button @click="quickAction('code')" class="card p-3 text-center text-sm font-medium hover:border-purple-500/30 active:scale-95 transition-all">
          <svg class="w-5 h-5 mx-auto mb-1.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
          Código
        </button>
        <button @click="quickAction('research')" class="card p-3 text-center text-sm font-medium hover:border-purple-500/30 active:scale-95 transition-all">
          <svg class="w-5 h-5 mx-auto mb-1.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Investigar
        </button>
        <button @click="quickAction('run')" class="card p-3 text-center text-sm font-medium hover:border-purple-500/30 active:scale-95 transition-all">
          <svg class="w-5 h-5 mx-auto mb-1.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Ejecutar
        </button>
      </div>
    </div>

    <!-- CHAT SECTION -->
    <div class="mb-6">
      <h2 class="text-sm font-semibold text-slate-400 mb-3">CHAT CON ARIA</h2>
      <div class="card overflow-hidden">
        <!-- Messages -->
        <div class="h-80 overflow-y-auto p-4 space-y-3" id="chat-messages" x-ref="chatbox">
          <template x-for="(msg, i) in messages" :key="i">
            <div class="flex" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
              <div :class="msg.role === 'user' ? 'msg-user bg-[#1e1e2a]' : 'msg-aria'">
                <div class="text-sm leading-relaxed whitespace-pre-wrap" x-html="renderMarkdown(msg.text)"></div>
              </div>
            </div>
          </template>
          <div x-show="thinking" class="flex justify-start">
            <div class="msg-aria">
              <div class="flex gap-1.5 py-1">
                <span class="w-2 h-2 rounded-full bg-purple-400 dot-pulse"></span>
                <span class="w-2 h-2 rounded-full bg-purple-400 dot-pulse"></span>
                <span class="w-2 h-2 rounded-full bg-purple-400 dot-pulse"></span>
              </div>
            </div>
          </div>
        </div>
        <!-- Input -->
        <div class="border-t border-[#1e1e2a] p-3 flex gap-2">
          <input type="text" x-model="chatInput" @keydown.enter="sendMessage" placeholder="Mensaje para ARIA..." class="flex-1 bg-[#1a1a24] rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-1 focus:ring-purple-500/30 placeholder-slate-600">
          <button @click="sendMessage" :disabled="!chatInput.trim() || thinking" class="btn-primary px-4 py-2.5 text-sm disabled:opacity-30" :class="thinking ? 'animate-pulse' : ''">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- SYSTEM STATUS -->
    <div class="card p-4 mb-6">
      <h2 class="text-sm font-semibold text-slate-400 mb-3">SISTEMA</h2>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-slate-500">Servidor</span><span class="text-green-400" x-text="online ? 'Activo' : 'Inactivo'"></span></div>
        <div class="flex justify-between"><span class="text-slate-500">API</span><span class="font-medium">/api/v1/*</span></div>
        <div class="flex justify-between"><span class="text-slate-500">AI Motor</span><span class="font-medium">HuggingFace → Groq</span></div>
        <div class="flex justify-between"><span class="text-slate-500">WebSocket</span><span class="font-medium">/ws/chat</span></div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="text-center text-xs text-slate-600 py-6">
      ARIA AI v3.3 — Autonomous Intelligence Platform
    </div>
  </div>

  <script>
    function dashboardApp() {
      return {
        sidebar: false,
        online: false,
        aiProviders: '0',
        toolsCount: '0',
        messages: [{ role: 'aria', text: '👋 ¡Hola! Soy **ARIA**. ¿En qué puedo ayudarte hoy?' }],
        chatInput: '',
        thinking: false,

        async init() {
          await this.loadStatus();
        },

        async loadStatus() {
          try {
            const r = await fetch('/api/v1/status');
            if (r.ok) {
              this.online = true;
              const d = await r.json();
              this.aiProviders = d.ai ? Object.keys(d.ai).length.toString() : '0';
            }
          } catch(e) { this.online = false; }
          try {
            const r = await fetch('/api/v1/tools');
            if (r.ok) {
              const d = await r.json();
              this.toolsCount = d.count.toString();
            }
          } catch(e) {}
        },

        async sendMessage() {
          if (!this.chatInput.trim() || this.thinking) return;
          const text = this.chatInput;
          this.messages.push({ role: 'user', text });
          this.chatInput = '';
          this.thinking = true;
          this.$nextTick(() => this.scrollChat());

          try {
            const r = await fetch('/api/v1/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: text, session_id: 'web_' + Date.now() })
            });
            const d = await r.json();
            this.messages.push({ role: 'aria', text: d.reply || '⚠️ Sin respuesta' });
          } catch(e) {
            this.messages.push({ role: 'aria', text: '⚠️ Error de conexión. Verifica que el servidor esté corriendo.' });
          } finally {
            this.thinking = false;
            this.$nextTick(() => this.scrollChat());
          }
        },

        async quickAction(type) {
          const actions = {
            chat: { msg: 'Cuéntame sobre tus capacidades' },
            code: { msg: 'Escribe un ejemplo de código Python que demuestre tus capacidades' },
            research: { msg: 'Investiga sobre las tendencias actuales en inteligencia artificial' },
            run: { msg: 'Ejecuta una misión: analiza el estado actual del sistema' }
          };
          const a = actions[type] || actions.chat;
          this.chatInput = a.msg;
          this.$nextTick(() => this.sendMessage());
        },

        scrollChat() {
          const el = this.$refs.chatbox;
          if (el) el.scrollTop = el.scrollHeight;
        },

        renderMarkdown(text) {
          if (!text) return '';
          let h = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre class="bg-[#0a0a0f] p-3 rounded-xl overflow-x-auto text-xs my-2"><code>$2</code></pre>');
          h = h.replace(/`([^`\n]+)`/g, '<code class="bg-[#0a0a0f] px-1.5 py-0.5 rounded text-xs text-purple-300">$1</code>');
          h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          h = h.replace(/\n/g, '<br>');
          return h;
        }
      };
    }
  </script>
</body>
</html>
