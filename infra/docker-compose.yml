version: "3.9"

# Local development topology mirroring production deployment.
# - aria-api:   FastAPI cognitive platform (main process)
# - redis:      Message queue + cache (production uses Upstash REST)
# - worker:     Background task processor (same image, different entrypoint)
#
# Usage:
#   docker-compose up aria-api          # API only
#   docker-compose up                   # Full stack
#   docker-compose up --scale worker=3  # 3 task workers
#
# Secrets (never committed):
#   Copy .env.example → .env and fill in values.
#   Production secrets live in Fly.io (fly secrets set KEY=VALUE).

services:
  aria-api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      PORT: "8000"
      REDIS_URL: "redis://redis:6379"
      ARIA_ENV: "local"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ../apps:/app/apps:ro  # hot-reload in dev; remove in prod

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "apps.core.runtime.task_queue_worker"]
    env_file:
      - ../.env
    environment:
      REDIS_URL: "redis://redis:6379"
      ARIA_ENV: "local"
      WORKER_CONCURRENCY: "4"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  redis_data:

networks:
  default:
    name: aria_network
