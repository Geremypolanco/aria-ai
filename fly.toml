# fly.toml app configuration file generated for aria-nexus

app = "aria-nexus"
primary_region = "mad"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512