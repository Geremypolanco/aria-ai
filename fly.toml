# fly.toml for ARIA — uses Dockerfile at repo root

  app = "aria-ai"
  primary_region = "ord"

  [env]
    PORT = "8080"
    ENVIRONMENT = "production"

  [http_service]
    internal_port = 8080
    force_https = true
    auto_stop_machines = true
    auto_start_machines = true
    min_machines_running = 0
  